<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2e36" />
      <stop offset="1" stop-color="#14161b" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f6fa" />
      <stop offset="0.55" stop-color="#c4ccd8" />
      <stop offset="1" stop-color="#7a8294" />
    </linearGradient>
    <linearGradient id="vial" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e18" stop-opacity="0.55" />
      <stop offset="1" stop-color="#0a0e18" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="fluid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4ec3a" />
      <stop offset="1" stop-color="#7ab81f" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc266" />
      <stop offset="1" stop-color="#f08a2a" />
    </linearGradient>
    <radialGradient id="bubble" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="0.85" stop-color="#ffffff" stop-opacity="0.55" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.25" />
    </radialGradient>
    <radialGradient id="bubble-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
    <clipPath id="stone-clip">
      <rect x="-220" y="-220" width="440" height="440" rx="34" />
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)" />
  <rect width="1024" height="1024" fill="url(#glow)" />

  <ellipse cx="512" cy="720" rx="240" ry="22" fill="rgba(0,0,0,0.55)" filter="url(#shadow)" />

  <line x1="160" y1="700" x2="864" y2="700" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" />

  <g transform="translate(512 480) rotate(-8)">
    <rect x="-220" y="-220" width="440" height="440" rx="34" fill="url(#stone)" />

    <g clip-path="url(#stone-clip)">
      <rect x="-180" y="-48" width="360" height="96" rx="48" fill="url(#vial)" />
      <rect x="-174" y="-42" width="348" height="84" rx="42" fill="url(#fluid)" />
      <rect x="-166" y="-38" width="332" height="10" rx="5" fill="#ffffff" opacity="0.28" />
      <line x1="-58" y1="-56" x2="-58" y2="56" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" />
      <line x1="58"  y1="-56" x2="58"  y2="56" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" />
      <circle cx="28" cy="0" r="42" fill="url(#bubble-glow)" />
      <circle cx="28" cy="0" r="32" fill="url(#bubble)" />
      <circle cx="28" cy="0" r="32" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2" />
      <ellipse cx="20" cy="-10" rx="10" ry="6" fill="#ffffff" opacity="0.95" />
      <path d="M -170 -44 Q 0 -47, 170 -44" fill="none" stroke="#000" stroke-opacity="0.25" stroke-width="2" />
    </g>

    <rect x="-220" y="-220" width="440" height="440" rx="34" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.5" />
  </g>

  <circle cx="512" cy="700" r="9" fill="url(#accent)" />
</svg>
