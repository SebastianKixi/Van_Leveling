<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Hintergrund-Verlauf: dunkelblau zu mittelblau -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F1E33"/>
    </linearGradient>

    <!-- Vial-Glas-Verlauf -->
    <linearGradient id="vialGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Bläschen-Verlauf (grün-leuchtend) -->
    <radialGradient id="bubble" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#A8FFB8"/>
      <stop offset="50%" stop-color="#34D158"/>
      <stop offset="100%" stop-color="#1A9A36"/>
    </radialGradient>

    <!-- Bläschen-Glanz -->
    <radialGradient id="bubbleHighlight" cx="35%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Schatten unter Vial -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Bläschen-Glow -->
    <filter id="bubbleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hintergrund (gerundet, wird von iOS automatisch zu Squircle maskiert) -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>

  <!-- Subtile Linien für Tiefe -->
  <line x1="0" y1="280" x2="1024" y2="280" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="744" x2="1024" y2="744" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Vial-Schatten (unten) -->
  <ellipse cx="512" cy="640" rx="380" ry="14" fill="#000000" fill-opacity="0.35" filter="url(#softShadow)"/>

  <!-- Vial (Glas-Pille) -->
  <g filter="url(#softShadow)">
    <!-- Glas-Hintergrund -->
    <rect x="132" y="432" width="760" height="200" rx="100" ry="100"
          fill="url(#vialGlass)"
          stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="3"/>

    <!-- Mittellinien (Toleranz-Marker) -->
    <line x1="438" y1="448" x2="438" y2="616" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="3"/>
    <line x1="586" y1="448" x2="586" y2="616" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="3"/>

    <!-- Skalen-Striche links -->
    <line x1="220" y1="468" x2="220" y2="492" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="280" y1="468" x2="280" y2="492" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="340" y1="468" x2="340" y2="492" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>

    <!-- Skalen-Striche rechts -->
    <line x1="684" y1="468" x2="684" y2="492" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="744" y1="468" x2="744" y2="492" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="804" y1="468" x2="804" y2="492" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>

    <!-- Skalen-Striche unten -->
    <line x1="220" y1="572" x2="220" y2="596" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="280" y1="572" x2="280" y2="596" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="340" y1="572" x2="340" y2="596" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="684" y1="572" x2="684" y2="596" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="744" y1="572" x2="744" y2="596" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="804" y1="572" x2="804" y2="596" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <!-- Bläschen (das Highlight) -->
  <g filter="url(#bubbleGlow)">
    <circle cx="512" cy="532" r="76" fill="url(#bubble)"/>
    <circle cx="512" cy="532" r="76" fill="url(#bubbleHighlight)"/>
  </g>
</svg>
